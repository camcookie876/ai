<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Camcookie AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #050816;
      --panel: #0b1020;
      --accent: #3b82f6;
      --accent-soft: rgba(59,130,246,0.15);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --danger: #f97373;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: radial-gradient(circle at top, #111827 0, #020617 45%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 16px;
    }
    .app {
      width: 100%;
      max-width: 900px;
      background: linear-gradient(145deg, #020617 0, #020617 40%, #020617 100%);
      border-radius: 18px;
      border: 1px solid rgba(148,163,184,0.25);
      box-shadow:
        0 0 0 1px rgba(15,23,42,0.9),
        0 18px 45px rgba(15,23,42,0.9);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid rgba(148,163,184,0.25);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: radial-gradient(circle at top left, rgba(59,130,246,0.25), transparent 55%);
    }
    .title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .title-main {
      font-weight: 600;
      letter-spacing: 0.03em;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cookie-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 12px rgba(59,130,246,0.9);
    }
    .title-sub {
      font-size: 11px;
      color: var(--muted);
    }
    .status-pill {
      font-size: 11px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.4);
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      background: rgba(15,23,42,0.9);
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34,197,94,0.9);
    }
    .status-dot.offline {
      background: #f97373;
      box-shadow: 0 0 10px rgba(248,113,113,0.9);
    }
    .status-text-strong {
      color: #e5e7eb;
    }

    .chat {
      flex: 1;
      padding: 14px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(148,163,184,0.6) transparent;
    }
    .messages::-webkit-scrollbar {
      width: 6px;
    }
    .messages::-webkit-scrollbar-thumb {
      background: rgba(148,163,184,0.6);
      border-radius: 999px;
    }
    .bubble-row {
      display: flex;
      width: 100%;
    }
    .bubble-row.user {
      justify-content: flex-end;
    }
    .bubble-row.ai {
      justify-content: flex-start;
    }
    .bubble {
      max-width: 80%;
      padding: 9px 11px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .bubble.user {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .bubble.ai {
      background: var(--panel);
      border: 1px solid rgba(148,163,184,0.4);
      border-bottom-left-radius: 4px;
    }
    .bubble.system {
      margin: 0 auto;
      background: rgba(15,23,42,0.9);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--muted);
      border: 1px dashed rgba(148,163,184,0.5);
    }
    .typing {
      display: inline-flex;
      gap: 3px;
      align-items: center;
    }
    .typing-dot {
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: rgba(148,163,184,0.9);
      animation: blink 1s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-1px); }
    }

    .input-bar {
      border-top: 1px solid rgba(148,163,184,0.25);
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      background: radial-gradient(circle at bottom, rgba(15,23,42,0.9), #020617 60%);
    }
    .input-wrap {
      flex: 1;
      position: relative;
    }
    textarea {
      width: 100%;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(148,163,184,0.5);
      background: rgba(15,23,42,0.9);
      color: var(--text);
      font-size: 13px;
      line-height: 1.4;
      outline: none;
    }
    textarea::placeholder {
      color: var(--muted);
    }
    .send-btn {
      border: none;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 500;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 0 18px rgba(59,130,246,0.6);
      transition: transform 0.08s ease, box-shadow 0.08s ease, opacity 0.08s ease;
      white-space: nowrap;
    }
    .send-btn:disabled {
      opacity: 0.5;
      box-shadow: none;
      cursor: default;
    }
    .send-btn:not(:disabled):active {
      transform: translateY(1px);
      box-shadow: 0 0 10px rgba(59,130,246,0.5);
    }
    .send-icon {
      font-size: 14px;
    }
    .error-text {
      color: var(--danger);
      font-size: 11px;
      margin-top: 4px;
    }
    @media (max-width: 640px) {
      .app { border-radius: 0; max-width: 100%; }
      body { padding: 0; }
      .header { padding: 10px 12px; }
      .chat { padding: 10px 10px 8px; }
      .input-bar { padding: 8px 8px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title">
        <div class="title-main">
          <span class="cookie-dot"></span>
          <span>Camcookie AI · LLaMA</span>
        </div>
        <div class="title-sub">Private Pi tunnel · Local Ollama · GitHub Pages UI</div>
      </div>
      <div class="status-pill" id="status-pill">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text-strong" id="status-text">Checking…</span>
      </div>
    </div>

    <div class="chat">
      <div class="messages" id="messages">
        <div class="bubble system">Camcookie is ready. Say hi.</div>
      </div>
      <div id="error" class="error-text" style="display:none;"></div>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="input" rows="1" placeholder="Send a message to your Pi-powered LLaMA…"></textarea>
      </div>
      <button id="send" class="send-btn">
        <span class="send-icon">➤</span>
        <span>Send</span>
      </button>
    </div>
  </div>

  <script>
    // LIVE URL
    const API_BASE = "https://curvy-carrots-fetch.loca.lt";

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const errorEl = document.getElementById("error");
    const statusDot = document.getElementById("status-dot");
    const statusText = document.getElementById("status-text");
    const statusPill = document.getElementById("status-pill");

    function appendBubble(role, text) {
      const row = document.createElement("div");
      row.className = "bubble-row " + role;

      const bubble = document.createElement("div");
      bubble.className = "bubble " + (role === "user" ? "user" : "ai");
      bubble.textContent = text;

      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function appendTyping() {
      const row = document.createElement("div");
      row.className = "bubble-row ai";

      const bubble = document.createElement("div");
      bubble.className = "bubble ai";

      const typing = document.createElement("div");
      typing.className = "typing";
      for (let i = 0; i < 3; i++) {
        const dot = document.createElement("div");
        dot.className = "typing-dot";
        typing.appendChild(dot);
      }
      bubble.appendChild(typing);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return row;
    }

    function setError(msg) {
      if (!msg) {
        errorEl.style.display = "none";
        errorEl.textContent = "";
      } else {
        errorEl.style.display = "block";
        errorEl.textContent = msg;
      }
    }

    async function checkStatus() {
      try {
        const res = await fetch(`${API_BASE}/status`, { method: "GET" });
        if (res.ok) {
          statusDot.classList.remove("offline");
          statusText.textContent = "Online";
          statusPill.title = "Pi + nginx + Ollama reachable";
        } else {
          statusDot.classList.add("offline");
          statusText.textContent = "Error";
          statusPill.title = "Status endpoint returned " + res.status;
        }
      } catch (e) {
        statusDot.classList.add("offline");
        statusText.textContent = "Offline";
        statusPill.title = "Could not reach tunnel";
      }
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      setError("");
      inputEl.value = "";
      sendBtn.disabled = true;

      appendBubble("user", text);
      const typingRow = appendTyping();

      try {
        const res = await fetch(`${API_BASE}/api/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "llama3.2",
            messages: [{ role: "user", content: text }]
          })
        });

        messagesEl.removeChild(typingRow);

        if (!res.ok) {
          setError(`Backend error: ${res.status}`);
          appendBubble("ai", "Hmm, I hit an error talking to the Pi backend.");
          return;
        }

        const data = await res.json();
        const reply =
          data?.message?.content ||
          data?.choices?.[0]?.message?.content ||
          JSON.stringify(data);

        appendBubble("ai", reply);
      } catch (err) {
        messagesEl.removeChild(typingRow);
        setError("Network error talking to tunnel.");
        appendBubble("ai", "I couldn’t reach the Pi tunnel. Check LocalTunnel + Wi‑Fi.");
      } finally {
        sendBtn.disabled = false;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    checkStatus();
    setInterval(checkStatus, 15000);
  </script>
</body>
</html>
