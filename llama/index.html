<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Camcookie AI</title>

<style>
  body {
    margin: 0;
    background: #0d1117;
    font-family: system-ui, sans-serif;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  header {
    background: linear-gradient(90deg, #005eff, #00aaff);
    padding: 16px;
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    color: white;
    box-shadow: 0 0 20px rgba(0, 122, 255, 0.6);
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg {
    max-width: 80%;
    padding: 14px 18px;
    border-radius: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
  }

  .user {
    align-self: flex-end;
    background: #1f6feb;
  }

  .ai {
    align-self: flex-start;
    background: #161b22;
    border: 1px solid #30363d;
  }

  #inputBar {
    display: flex;
    padding: 12px;
    background: #0d1117;
    border-top: 1px solid #30363d;
  }

  #msgInput {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #161b22;
    color: white;
    font-size: 16px;
  }

  #sendBtn {
    margin-left: 10px;
    padding: 12px 20px;
    background: #005eff;
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  #sendBtn:hover {
    background: #0077ff;
  }
</style>
</head>

<body>
<header>Camcookie AI</header>

<div id="chat"></div>

<div id="inputBar">
  <input id="msgInput" placeholder="Ask me anything..." />
  <button id="sendBtn">Send</button>
</div>

<script>
  // Replace this with your ngrok URL each time you run ai.sh
  const API_BASE = "http://hydremic-idella-screwlike.ngrok-free.dev/";

  const chat = document.getElementById("chat");
  const input = document.getElementById("msgInput");
  const sendBtn = document.getElementById("sendBtn");

  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = "msg " + sender;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const aiDiv = addMessage("...", "ai");

    const response = await fetch(`${API_BASE}/api/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "llama3.2",
        messages: [{ role: "user", content: text }],
        stream: true
      })
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    let fullText = "";

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      fullText += chunk;
      aiDiv.textContent = fullText;
      chat.scrollTop = chat.scrollHeight;
    }
  }

  sendBtn.onclick = sendMessage;
  input.onkeydown = (e) => {
    if (e.key === "Enter") sendMessage();
  };
</script>
</body>
</html>
